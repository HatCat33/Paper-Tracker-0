name: Daily Paper Digest

on:
  schedule:
    # UTC 19:00 = 北京时间次日 03:00
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      send_email:
        description: "发送邮件日报"
        type: choice
        required: true
        default: "true"
        options:
          - "true"
          - "false"
      lookback_days:
        description: "回溯天数（留空使用配置文件值）"
        type: string
        required: false
        default: ""

concurrency:
  group: paper-tracker-digest
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: 1

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Calculate GitHub Pages URL
        id: pages
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          echo "url=https://${OWNER}.github.io/${REPO_NAME}" >> $GITHUB_OUTPUT

      - name: Run Paper Tracker Pipeline
        id: tracker
        run: |
          ARGS="--config config.yaml"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.send_email }}" = "false" ]; then
              ARGS="$ARGS --no-email"
            fi
            if [ -n "${{ github.event.inputs.lookback_days }}" ]; then
              ARGS="$ARGS --lookback-days ${{ github.event.inputs.lookback_days }}"
            fi
          fi
          python -m src.cli run $ARGS
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          S2_API_KEY: ${{ secrets.S2_API_KEY }}

      - name: Commit outputs and state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage outputs (JSON + MD)
          git add outputs/papers-*.json 2>/dev/null || true
          git add outputs/*.json 2>/dev/null || true

          # Stage docs (static site)
          git add docs/ 2>/dev/null || true

          # Stage state (dedup)
          git add .state/seen.json 2>/dev/null || true

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update paper digest $(date +%Y-%m-%d)"
            git pull --rebase
            git push
          fi
